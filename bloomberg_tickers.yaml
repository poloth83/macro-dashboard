# 패널별 블룸버그 티커 매핑. 회사 PC에서 securityError가 나오면 여기서 티커만 보정.
# 모든 ticker는 Bloomberg HistoricalDataRequest 기준 security 문자열.
# frequency: daily는 거래일 시계열, release는 발표 지표 시계열.

defaults:
  field: PX_LAST
  history_window: 3Y

smoke_tickers:
  - "USGG2YR Index"
  - "USGG10YR Index"
  - "SOFRRATE Index"
  - "IRRBIOER Index"
  - "SPX Index"
  - "USDJPY Curncy"
  - "TY1 Comdty"
  - "SFR1 Comdty"

panels:

  liquidity:
    name: 달러 유동성
    series:
      # H.4.1 4종은 주 1회(목요일) 발표. blpapi NON_TRADING_WEEKDAYS fill 때문에 daily로 보면 1D 변화가 항상 0으로 노이즈처럼 깔리므로 release frequency로 처리.
      # ticker 교체: FARBAST → FARBFSRF (2026-05-14, 사용자 지정). scale은 새 ticker의 raw 단위 확인 후 검증.
      - {ticker: "FARBFSRF Index", label: "Fed Balance Sheet", unit: "USD bn", frequency: "release", stale_days: 14, min_obs: 52, scale: 0.001}
      - {ticker: "FARBRBFB Index", label: "Reserve Balances", unit: "USD bn", frequency: "release", stale_days: 14, min_obs: 52, scale: 0.001}
      - {ticker: "FARBDTRS Index", label: "TGA", unit: "USD bn", frequency: "release", stale_days: 14, min_obs: 52, scale: 0.001}
      - {ticker: "FARWDEAL Index", label: "Overnight RRP", unit: "USD bn", frequency: "release", stale_days: 14, min_obs: 52, scale: 0.001}
      - {ticker: "SOFRRATE Index", label: "SOFR", unit: "%", required: true, window_years: 5, decimals: 3}
      - {ticker: "IRRBIOER Index", label: "IORB", unit: "%", required: true, window_years: 5, decimals: 3}

  risk_regime:
    name: Risk Regime
    series:
      - {ticker: "SPX Index", label: "S&P 500", unit: "pt", required: true}
      - {ticker: "NDX Index", label: "Nasdaq 100", unit: "pt"}
      - {ticker: "RTY Index", label: "Russell 2000", unit: "pt"}
      - {ticker: "VIX Index", label: "VIX", unit: "vol", required: true, headline: true, priority: 8}
      - {ticker: "MOVE Index", label: "MOVE", unit: "vol", headline: true, priority: 9}

  ust_core:
    name: UST 코어
    series:
      - {ticker: "USGG3M Index", label: "UST 3M", unit: "%", decimals: 3}
      - {ticker: "USGG2YR Index", label: "UST 2Y", unit: "%", required: true, headline: true, priority: 1, decimals: 3}
      - {ticker: "USGG5YR Index", label: "UST 5Y", unit: "%", required: true, decimals: 3}
      - {ticker: "USGG7YR Index", label: "UST 7Y", unit: "%", decimals: 3}
      - {ticker: "USGG10YR Index", label: "UST 10Y", unit: "%", required: true, headline: true, priority: 2, decimals: 3}
      - {ticker: "USGG30YR Index", label: "UST 30Y", unit: "%", required: true, headline: true, priority: 3, decimals: 3}
      - {ticker: "USYC2Y10 Index", label: "2s10s slope", unit: "bp", headline: true, priority: 4, decimals: 2}
      - {ticker: "USYC5Y30 Index", label: "5s30s slope", unit: "bp", decimals: 2}

  ust_futures:
    name: UST Futures
    series:
      - {ticker: "TU1 Comdty", label: "TU Generic 1st", unit: "px"}
      - {ticker: "FV1 Comdty", label: "FV Generic 1st", unit: "px"}
      - {ticker: "TY1 Comdty", label: "TY Generic 1st", unit: "px", required: true}
      - {ticker: "US1 Comdty", label: "US Generic 1st", unit: "px"}
      - {ticker: "WN1 Comdty", label: "Ultra Bond 1st", unit: "px"}

  sofr_fomc:
    name: SOFR / FOMC
    series:
      - {ticker: "SFR1 Comdty", label: "SOFR Fut 1st", unit: "px", required: true, window_years: 5}
      - {ticker: "SFR2 Comdty", label: "SOFR Fut 2nd", unit: "px", window_years: 5}
      - {ticker: "SFR3 Comdty", label: "SOFR Fut 3rd", unit: "px", window_years: 5}

  real_bei:
    name: 실질금리 & BEI
    series:
      - {ticker: "USGGBE05 Index", label: "5Y BEI", unit: "%", decimals: 3}
      - {ticker: "USGGBE10 Index", label: "10Y BEI", unit: "%", required: true, headline: true, priority: 5, decimals: 3}
      - {ticker: "USGGT05Y Index", label: "5Y TIPS yield", unit: "%", window_years: 5, decimals: 3}
      - {ticker: "USGGT10Y Index", label: "10Y TIPS yield", unit: "%", required: true, window_years: 5, headline: true, priority: 6, decimals: 3}
      - {ticker: "USGG5Y5Y Index", label: "5Y5Y BEI", unit: "%", decimals: 3}
      - {ticker: "USSWIT5 Curncy", label: "5Y Infl Swap", unit: "%", decimals: 3}
      - {ticker: "USSWIT10 Curncy", label: "10Y Infl Swap", unit: "%", decimals: 3}

  swap_spread:
    # 패널명은 raw swap rate를 표시한다는 의미로 단순화. 진짜 스왑스프레드(swap - UST)는 derived 섹션에 별도 노출.
    name: SOFR Swap Rates
    series:
      - {ticker: "USOSFR2 Curncy", label: "SOFR Swap 2Y", unit: "%", decimals: 3}
      - {ticker: "USOSFR5 Curncy", label: "SOFR Swap 5Y", unit: "%", decimals: 3}
      - {ticker: "USOSFR10 Curncy", label: "SOFR Swap 10Y", unit: "%", required: true, decimals: 3}
      - {ticker: "USOSFR30 Curncy", label: "SOFR Swap 30Y", unit: "%", decimals: 3}

  global_duration:
    name: 글로벌 듀레이션
    series:
      - {ticker: "GDBR10 Index", label: "Bund 10Y", unit: "%", decimals: 3}
      - {ticker: "GBTPGR10 Index", label: "BTP 10Y", unit: "%", decimals: 3}
      - {ticker: "GFRN10 Index", label: "OAT 10Y", unit: "%", decimals: 3}
      - {ticker: "GUKG10 Index", label: "Gilt 10Y", unit: "%", decimals: 3}
      - {ticker: "GUKG30 Index", label: "Gilt 30Y", unit: "%", decimals: 3}
      - {ticker: "GJGB10 Index", label: "JGB 10Y", unit: "%", decimals: 3}
      - {ticker: "GJGB30 Index", label: "JGB 30Y", unit: "%", decimals: 3}

  fx:
    name: FX
    series:
      - {ticker: "DXY Curncy", label: "DXY", unit: "idx"}
      - {ticker: "EURUSD Curncy", label: "EUR/USD", unit: "fxpair"}
      - {ticker: "USDJPY Curncy", label: "USDJPY", unit: "JPY", required: true, headline: true, priority: 12}
      - {ticker: "USDKRW Curncy", label: "USDKRW", unit: "KRW"}

  commodities:
    name: 원자재
    series:
      - {ticker: "CL1 Comdty", label: "WTI", unit: "cmdty"}
      - {ticker: "GC1 Comdty", label: "Gold", unit: "cmdty"}
      - {ticker: "HG1 Comdty", label: "Copper", unit: "cmdty"}

  credit:
    name: Credit Proxy
    series:
      - {ticker: "LQD US Equity", label: "LQD 8Y (IG ETF)", unit: "USD"}
      - {ticker: "HYG US Equity", label: "HYG 3Y (HY ETF)", unit: "USD"}
      - {ticker: "LUACOAS Index", label: "US IG OAS 7Y", unit: "bp", scale: 100, headline: true, priority: 10}
      - {ticker: "LF98OAS Index", label: "US HY OAS 4Y", unit: "bp", scale: 100, headline: true, priority: 11}
      - {ticker: "CDX IG CDSI GEN 5Y Corp", label: "CDX IG 5Y", unit: "bp"}
      - {ticker: "CDX HY CDSI GEN 5Y SPRD Corp", label: "CDX HY 5Y", unit: "bp"}

  macro:
    name: 매크로 지표
    series:
      - {ticker: "CPI YOY Index", label: "Headline CPI YoY", unit: "%", frequency: "release", min_obs: 12}
      - {ticker: "CPI XYOY Index", label: "Core CPI YoY", unit: "%", frequency: "release", min_obs: 12}
      - {ticker: "PPI YOY Index", label: "PPI YoY", unit: "%", frequency: "release", min_obs: 12}
      - {ticker: "NFP TCH Index", label: "Nonfarm Payrolls", unit: "k", frequency: "release", min_obs: 12}
      - {ticker: "ADP CHNG Index", label: "ADP Employment", unit: "k", frequency: "release", min_obs: 12}
      - {ticker: "JOLTTOTL Index", label: "JOLTS Openings", unit: "k", frequency: "release", min_obs: 12}
      - {ticker: "INJCJC Index", label: "Initial Claims", unit: "k", frequency: "release", min_obs: 12, stale_days: 21}
      - {ticker: "INJCSP Index", label: "Continuing Claims", unit: "k", frequency: "release", min_obs: 12, stale_days: 21}
      - {ticker: "NAPMPMI Index", label: "ISM Manufacturing", unit: "idx", frequency: "release", min_obs: 12}
      - {ticker: "NAPMNMI Index", label: "ISM Services", unit: "idx", frequency: "release", min_obs: 12}
      - {ticker: "CONSSENT Index", label: "Michigan Sentiment", unit: "idx", frequency: "release", min_obs: 12}
      - {ticker: "CONSPXMD Index", label: "Michigan Inf Exp 1Y", unit: "%", frequency: "release", min_obs: 12}
      - {ticker: "RSTAMOM Index", label: "Retail Sales MoM", unit: "%", frequency: "release", min_obs: 12}
      - {ticker: "GDP CQOQ Index", label: "GDP QoQ Annualized", unit: "%", frequency: "release", min_obs: 8, stale_days: 120}
      - {ticker: "GDGCAFJP Index", label: "Atlanta GDPNow", unit: "%", frequency: "release", min_obs: 8, stale_days: 21}

  macro_reaction:
    # 중복 reaction 카드 4종(UST 2Y/10Y, USDJPY, SPX)은 제거 — 각각 원 패널에 이미 있고 surprise 기능은 미구현이라 시각상 중복만 됨. CESIUSD만 유지.
    name: Macro Surprise
    series:
      - {ticker: "CESIUSD Index", label: "US Econ Surprise", unit: "idx"}

derived:
  - {name: "SOFR-IORB spread", formula: "SOFRRATE Index - IRRBIOER Index", unit: "bp", window_years: 5}
  - {name: "10Y Swap Spread", formula: "USOSFR10 Curncy - USGG10YR Index", unit: "bp", headline: true, priority: 7, decimals: 2}
  - {name: "5Y Swap Spread", formula: "USOSFR5 Curncy - USGG5YR Index", unit: "bp"}
  - {name: "2Y Swap Spread", formula: "USOSFR2 Curncy - USGG2YR Index", unit: "bp"}
  - {name: "30Y Swap Spread", formula: "USOSFR30 Curncy - USGG30YR Index", unit: "bp"}
  - {name: "BTP-Bund 10Y", formula: "GBTPGR10 Index - GDBR10 Index", unit: "bp"}
  - {name: "OAT-Bund 10Y", formula: "GFRN10 Index - GDBR10 Index", unit: "bp"}
  - {name: "3M10Y slope", formula: "USGG10YR Index - USGG3M Index", unit: "bp"}
  - {name: "2/5/10 butterfly", formula: "2*USGG5YR Index - USGG2YR Index - USGG10YR Index", unit: "bp"}
  # SFR implied rate / SFR-IORB gap derived는 제거됨 (2026-05-12).
  # 사유: SFR{1,2,3} Comdty는 generic rolling 3M SOFR future로, 정산식이 "다음 IMM 분기 평균 SOFR"이라
  # "다음 FOMC implied rate"와 의미가 다름. WIRP-style 회의별 implied rate는 Bloomberg API로 노출되지
  # 않음을 probe (scripts/probe_fomc_implied.py)로 확인. 향후 FF futures decomposition이 필요해지면 별도 구현.
  - {name: "10Y Real (TIPS)", formula: "USGGT10Y Index", unit: "%", window_years: 5}
  - {name: "5Y Real (TIPS)", formula: "USGGT05Y Index", unit: "%", window_years: 5}
  - {name: "IG OAS beta vs SPX", type: "rolling_beta", y: "LUACOAS Index", x: "SPX Index", x_mode: "pct", window: 60, unit: "bp/%"}
  # 추세 강도 보조. 주식지수 raw level의 3Y percentile/z-score는 강세장에서 구조적으로 +2σ에 깔리므로,
  # 200dma 이격도가 사이클 위치 판단에 더 유용. unit="dev%"는 build_dashboard에서 +X.X% / +X.XXpp 포맷팅.
  - {name: "SPX 200dma 이격도", type: "ma_distance", x: "SPX Index", window: 200, unit: "dev%"}
  - {name: "NDX 200dma 이격도", type: "ma_distance", x: "NDX Index", window: 200, unit: "dev%"}
  - {name: "RTY 200dma 이격도", type: "ma_distance", x: "RTY Index", window: 200, unit: "dev%"}
